name: Update Discord Widget

on:
  workflow_dispatch:
  # Optional safety fallback — in case the self-trigger step below fails or
  # the runner gets killed before it fires. Pick a cron a bit tighter than
  # the ~5h50m budget so there's never a long gap with a stale widget.
  schedule:
    - cron: "0 */6 * * *"

# GitHub defaults GITHUB_TOKEN to read-only unless a workflow explicitly asks
# for more (repo-level "Read and write permissions" setting doesn't cover
# this either once a workflow declares its own `permissions:` block, and this
# one needs to). Without `actions: write` the self-trigger's POST to
# /dispatches 403s with "Resource not accessible by integration" even though
# curl runs and the token is valid.
permissions:
  actions: write
  contents: read

# Only one live updater at a time — two instances PATCHing the same Discord
# widget concurrently would fight each other's rate-limit bucket and state.
# cancel-in-progress: false means a second trigger (e.g. schedule firing while
# the self-triggered run is still up) queues instead of killing the live one.
concurrency:
  group: lyrically-widget-daemon
  cancel-in-progress: false


jobs:
  update:
    runs-on: ubuntu-latest
    # Outer safety net. widget.py exits on its own ~5h50m (MAX_RUNTIME_SECONDS)
    # well before this, so the job finishes clean instead of being SIGKILLed.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run widget daemon (~5h50m, then exits cleanly)
        run: python widget.py
        env:
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_IMAGE_WEBHOOK_URL: ${{ secrets.DISCORD_IMAGE_WEBHOOK_URL }}
          # "spotify" (default) needs the app owner to have Spotify Premium as
          # of Spotify's Feb 2026 Development Mode policy -- Free accounts get
          # a hard 403 on every playback call. If that's you, set this repo
          # variable (Settings -> Secrets and variables -> Actions -> Variables)
          # to "lastfm" and fill in the two LASTFM_* secrets below instead.
          NOWPLAYING_SOURCE: ${{ vars.NOWPLAYING_SOURCE || 'spotify' }}
          # Live Discord widget rate-limit buckets have been observed as tight
          # as limit=3 per ~20-40s window. widget.py's default reserve (2)
          # already accounts for this, but if you still see lyrics "stuck"
          # and only catching up after skipping songs, raise this repo
          # variable further (e.g. to 3) to glide even earlier.
          RATE_LIMIT_RESERVE: ${{ vars.RATE_LIMIT_RESERVE }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}

      # ✅ SELF-TRIGGER NEXT RUN (Core Feature)
      # widget.py returned because it hit its own runtime budget, not because
      # it crashed — immediately queue the next run so the widget never goes
      # stale for longer than the handoff takes. If this fails for any reason
      # the schedule fallback above still catches it within 6h.
      - name: Trigger next run
        if: always()
        run: |
          echo "Triggering next workflow run..."

          # -f makes curl exit non-zero on a 4xx/5xx so this step actually
          # shows red in the Actions tab instead of silently swallowing a
          # permissions error (that's how the earlier 403 went unnoticed —
          # the step "succeeded" with a 403 body printed to the log).
          curl -sS -f -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'

          echo "Next run queued."

name: Discord Lyrically Widget

on:
  workflow_dispatch:
  schedule:
    # Backup restart every 6 hours if no manual trigger
    - cron: "0 */6 * * *"

concurrency:
  group: lyrically-widget
  cancel-in-progress: false

jobs:
  run-widget:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Discord Lyrically Widget
        env:
          # Discord
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_IMAGE_WEBHOOK_URL: ${{ secrets.DISCORD_IMAGE_WEBHOOK_URL }}

          # Spotify
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

          # Safety runtime (5h 50m)
          MAX_RUNTIME_SECONDS: "21000"

        run: |
          echo "Starting Discord Lyrically service..."

          while true
          do
            echo "----------------------------------------"
            echo "Starting widget.py at $(date)"
            echo "----------------------------------------"

            python widget.py
            EXIT_CODE=$?

            echo "widget.py exited with code: $EXIT_CODE"

            # If script exits unexpectedly, wait before restart
            echo "Restarting in 30 seconds..."
            sleep 30
          done
